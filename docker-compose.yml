services:
  core:
    build:
      context: .
      dockerfile: Dockerfile
    image: continuity-break-detector:core

  timesfm-worker:
    build:
      context: .
      dockerfile: docker/timesfm/Dockerfile
    image: continuity-break-detector:timesfm-worker
    environment:
      CBD_TIMESFM_PYTHON: /usr/local/bin/python
      CBD_RUN_ML_MODEL_SMOKE: ${CBD_RUN_ML_MODEL_SMOKE:-0}
      CBD_TIMESFM_MODEL_ID: ${CBD_TIMESFM_MODEL_ID:-google/timesfm-1.0-200m-pytorch}
      HF_HOME: /root/.cache/huggingface
    volumes:
      - hf_cache:/root/.cache/huggingface

  chronos-worker:
    build:
      context: .
      dockerfile: docker/chronos/Dockerfile
    image: continuity-break-detector:chronos-worker
    environment:
      CBD_CHRONOS_PYTHON: /usr/local/bin/python
      CBD_RUN_ML_MODEL_SMOKE: ${CBD_RUN_ML_MODEL_SMOKE:-0}
      CBD_CHRONOS_MODEL_ID: ${CBD_CHRONOS_MODEL_ID:-amazon/chronos-bolt-small}
      HF_HOME: /root/.cache/huggingface
    volumes:
      - hf_cache:/root/.cache/huggingface

volumes:
  hf_cache:
